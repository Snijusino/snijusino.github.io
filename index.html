## THE ROOT FILE: A STORY OF SILENCE
My life started like everyone else’s, but the foundation was cracked early. 1st Grade. Midnight. My throat felt blocked—a physical barrier that stopped my words. All I could do was cry. That trauma never left me; it became a root file that cannot be deleted. I became a fake to survive. I stayed hidden in the shadows of Idukki.

## THE BLACK SCREEN
By 8th grade, I was drifting. Society labeled me a "bad kid," so I accepted the name. Then the pandemic hit. I opened a terminal for the first time—a black screen with a blinking cursor. It didn't judge me. It didn't call me weak. I taught myself to code. I built scripts that destroyed data with zero-footprint. I realized I understood the architecture of the digital world.

## ASHNA: THE ONLY HIGH
I remember that cold breeze at the school door. I saw her: Ashna. I was locked in her eyes. I ran away the first time, but I came back to say my name: SNIJU. We became best friends. I loved her, but I was terrified. When I proposed, I got a beating. The trauma came back. My throat blocked. A "friend" betrayed us with lies. 

But on Oct 20th, she proposed to me. She was the real high. Not tobacco, not the code. Just her. I didn't just love her; I became addicted. She was my home.

## THE SYSTEM CRASH
Withdrawals. Grandmother passing away. Friends betraying me again. I told myself, "It’s okay, I have her." Then Jan 24, 2026. At the bus stand, she ended it. The stress replaced the dopamine. I lost myself. I finished board exams with 0% effort because I was already gone.

## THE FINAL LOG
I look in the mirror and I see a loser. A loser son, a loser brother, a loser boyfriend. People think I’m okay because I’m an expert at being fake. I’m high on a pain more dangerous than any drug.

I loved her more than anything. I still do. She is my home, even if the doors are locked. If I disappear, it’s because every small particle of trauma turned into a stone too heavy to carry.

I tried to be better. I really did. I’m sorry.

~Сниджу.Ашна 🤍🫠
[END OF LOG]`;

                setTimeout(typeWriter, 25);
